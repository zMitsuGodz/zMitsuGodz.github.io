    .anim-text {
      position: absolute; width: 90%; text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      transform-style: preserve-3d; opacity: 0;
    }

    .text-alex {
      font-size: 3.5rem; color: #00ffff; text-shadow: 0 0 20px #00ffff, 4px 4px 0px #000; letter-spacing: 2px;

    .text-punchline {
      font-size: 3.2rem; color: #ffbe0b; text-shadow: 0 0 20px #ffbe0b, 4px 4px 0px #000; letter-spacing: 1px;

    .pop-out { animation: popOutSeq 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      40% { transform: scale(1.2) translateZ(100px); opacity: 1; }
      80% { transform: scale(1) translateZ(50px); opacity: 1; }
      100% { transform: scale(2.5) translateZ(300px); opacity: 0; }

    .pop-stay { animation: popOutStay 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

    function initVisits() {
      let visits = localStorage.getItem('mitsugames_e5_visits') || 0;
      visits++;
      localStorage.setItem('mitsugames_e5_visits', visits);
      document.getElementById('visitCount').innerText = visits;
    }
    initVisits();

    function unlockChistes() {
      lockClicks++;
      if (lockClicks === 1) {
        document.getElementById('cat-chistes-lock').innerText = "🔓 ¡1 Clic más!";
      } else if (lockClicks >= 2) {
        isChistesUnlocked = true;
        document.getElementById('cat-chistes-lock').classList.add('hidden');
        document.getElementById('cat-chistes').classList.remove('hidden');
        alert("🎉 ¡FELICIDADES! Has desbloqueado permanentemente la categoría secreta: 😂 Chistes de Alexander");
        setCategory('chistes');
      }
    }

    // BUSCADOR DE YOUTUBE EN EL REPRODUCTOR INFERIOR
    function searchAndPlayYT() {
      const input = document.getElementById('ytUrl').value.trim();
      const videoDisplay = document.getElementById('videoDisplay');
      let videoId = "";

      if (input.includes("v=")) {
        videoId = input.split("v=")[1].split("&")[0];
      } else if (input.includes("youtu.be/")) {
        videoId = input.split("youtu.be/")[1].split("?")[0];
      } else if (input.length > 0) {
        videoId = encodeURIComponent(input);
      }

      if (input.includes("http")) {
        videoDisplay.innerHTML = `<iframe id="mainYTIframe" src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      } else {
        videoDisplay.innerHTML = `<iframe id="mainYTIframe" src="https://www.youtube.com/embed?listType=search&list=${videoId}&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      }
    }

    function playSpinSound() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      let speed = 60;
      let count = 0;
      
      function playClick() {
        if (count > 25) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400 + (count * 10), ctx.currentTime);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.04);

        count++;
        speed += 10;
        setTimeout(playClick, speed);
      }
      playClick();
    }

    function getSpecialEmoji(nameUpper) {
      if (nameUpper.includes("MARVIN") || nameUpper.includes("MARVINA")) {
        return Math.random() < 0.5 ? "🏳️‍🌈" : "🐐";
      } else if (nameUpper.includes("JORDAN")) {
        return "🐸";
      } else if (nameUpper.includes("DAN")) {
        return "🐮";
      } else {
        return emojisRandom[Math.floor(Math.random() * emojisRandom.length)];
      }
    }

    function addPlayer() {
      const input = document.getElementById('playerName');
      let name = input.value.trim();
      if (name) {
        name = name.toUpperCase();
        const selectedEmoji = getSpecialEmoji(name);
        const fullName = `${selectedEmoji} ${name}`;

        if (!players.find(p => p.rawName === name)) {
          players.push({ name: fullName, rawName: name, lives: 3, truthCount: 0 });
          input.value = '';
          renderPlayers();
        }
      }
    }

    function removePlayer(rawName) {
      players = players.filter(p => p.rawName !== rawName);
      renderPlayers();
    }

    function renderPlayers() {
      const list = document.getElementById('playerList');
      list.innerHTML = players.map(p => `
        <div class="tag">
          ${p.name} ${currentMode === 'ruleta' ? `<span class="lives">❤️${p.lives}</span>` : ''}
          <span class="remove" onclick="removePlayer('${p.rawName}')">&times;</span>
        </div>
      `).join('');
    }

    function setMode(mode) {
      currentMode = mode;
      hideOptionButtons();
      document.getElementById('actionTitle').innerText = mode === 'botella' ? '🍾 MODO BOTELLA GIRATORIA' : '🎯 MODO RULETA DIRECTA';
      document.getElementById('promptText').innerText = '';
      renderPlayers();
      
      // Asegurarse de mantener coherencia si estamos en chistes
      if(currentCategory === 'chistes'){
         setCategory('chistes');
      }
    }

    function setCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`cat-${cat}`);
      if (activeBtn) activeBtn.classList.add('active');
      
      const gameAreaCard = document.getElementById('gameAreaCard');
      const spinBtnCard = document.getElementById('spinBtnCard');
      const btnFullAlexanderNext = document.getElementById('btnFullAlexanderNext');

      if (cat === 'chistes') {
        gameAreaCard.classList.add('hidden');
        spinBtnCard.classList.add('hidden');
        btnFullAlexanderNext.classList.remove('hidden');
        document.getElementById('actionTitle').innerText = "😂 MODO FULL CHISTES DE ALEXANDER";
        displayJoke();
      } else {
        gameAreaCard.classList.remove('hidden');
        spinBtnCard.classList.remove('hidden');
        btnFullAlexanderNext.classList.add('hidden');
        hideOptionButtons();
        document.getElementById('promptText').innerText = "Giren la botella o ruleta para empezar.";
      }
    }

    function hideOptionButtons() {
      document.getElementById('botellaOptions').classList.add('hidden');
      document.getElementById('ruletaOptions').classList.add('hidden');
      document.getElementById('btnSwapBotella').classList.add('hidden');
      document.getElementById('btnSwapRuleta').classList.add('hidden');
      document.getElementById('jokeHeader').classList.add('hidden');
      document.getElementById('btnTalk').classList.add('hidden');
      document.getElementById('btnFullAlexanderNext').classList.add('hidden');
    }

    function spin() {
      if (players.length < 2) {
        alert("⚠️ ¡Añade al menos 2 jugadores para poder jugar!");
        return;
      }
      if (isSpinning) return;

      isSpinning = true;
      hideOptionButtons();
      document.getElementById('promptText').innerText = '';

      playSpinSound();

      if (currentMode === 'botella') {
        let rouletteInterval = setInterval(() => {
          const randA = players[Math.floor(Math.random() * players.length)].name;
          let randB;
          do {
            randB = players[Math.floor(Math.random() * players.length)].name;
          } while (randA === randB && players.length > 1);

          document.getElementById('actionTitle').innerHTML = `👉 ${randA} ➔ ${randB}`;
        }, 70);

        const extraSpins = 5 + Math.floor(Math.random() * 5);
        const randomDegree = Math.floor(Math.random() * 360);
        currentRotation += (extraSpins * 360) + randomDegree;
        document.getElementById('canContainer').style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(rouletteInterval);
          isSpinning = false;
          processBotellaResult();
        }, 3500);

      } else {
        let rouletteInterval = setInterval(() => {
          const rand = players[Math.floor(Math.random() * players.length)].name;
          document.getElementById('actionTitle').innerText = `🎯 ${rand}`;
        }, 70);

        const extraSpins = 5 + Math.floor(Math.random() * 5);
        const randomDegree = Math.floor(Math.random() * 360);
        currentRotation += (extraSpins * 360) + randomDegree;
        document.getElementById('canContainer').style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(rouletteInterval);
          isSpinning = false;
          processRuletaResult();
        }, 3500);
      }
    }

    function processBotellaResult() {
      let indexA = Math.floor(Math.random() * players.length);
      let indexB;
      do {
        indexB = Math.floor(Math.random() * players.length);
      } while (indexA === indexB);

      activePlayer = players[indexA].name;
      targetPlayer = players[indexB].name;

      const titleEl = document.getElementById('actionTitle');
      titleEl.innerHTML = `👉 <span style="color:#00ffff">${activePlayer}</span> ➔ <span style="color:#ff007f">${targetPlayer}</span>`;
      titleEl.classList.add('winner-flash');
      setTimeout(() => titleEl.classList.remove('winner-flash'), 1000);

      document.getElementById('promptText').innerText = `¡${activePlayer}, decide qué reto o verdad cumplirá ${targetPlayer}!`;
      document.getElementById('botellaOptions').classList.remove('hidden');
    }

    function processRuletaResult() {
      const randomIndex = Math.floor(Math.random() * players.length);
      activePlayer = players[randomIndex];

      const titleEl = document.getElementById('actionTitle');
      titleEl.innerHTML = `🎯 TURNO DE: <span style="color:#00ffff">${activePlayer.name}</span> (❤️ ${activePlayer.lives})`;
      titleEl.classList.add('winner-flash');
      setTimeout(() => titleEl.classList.remove('winner-flash'), 1000);

      document.getElementById('promptText').innerText = `Llevas ${activePlayer.truthCount}/3 Verdades seguidas en modo ${currentCategory.toUpperCase()}.`;

      const btnVerdad = document.getElementById('btnVerdad');
      if (activePlayer.truthCount >= 3) {
        btnVerdad.disabled = true;
        btnVerdad.innerText = "❓ Verdad (Límite 3/3)";
      } else {
        btnVerdad.disabled = false;
        btnVerdad.innerText = `❓ Verdad (${activePlayer.truthCount}/3)`;
      }

      document.getElementById('ruletaOptions').classList.remove('hidden');
    }

    function getBottlePrompt(type) {
      currentPromptType = type;
      const catData = baseDatos[currentCategory];

      if (type === 'verdad') {
        const randomQ = catData.verdades[Math.floor(Math.random() * catData.verdades.length)];
        document.getElementById('promptText').innerText = `[VERDAD - ${currentCategory.toUpperCase()}]: ${randomQ}`;
        document.getElementById('btnSwapBotella').classList.remove('hidden');
      } else if (type === 'reto') {
        const randomR = catData.retos[Math.floor(Math.random() * catData.retos.length)];
        document.getElementById('promptText').innerText = `[RETO - ${currentCategory.toUpperCase()}]: ${randomR}`;
        document.getElementById('btnSwapBotella').classList.remove('hidden');
      } else {
        document.getElementById('promptText').innerText = `💬 ¡${activePlayer} le inventa o pregunta libremente a ${targetPlayer}!`;
        document.getElementById('btnSwapBotella').classList.add('hidden');
      }
    }

    function chooseType(type) {
      if (!activePlayer) return;
      currentPromptType = type;
      const catData = baseDatos[currentCategory];

      if (type === 'verdad') {
        activePlayer.truthCount++;
        const randomQ = catData.verdades[Math.floor(Math.random() * catData.verdades.length)];
        document.getElementById('promptText').innerText = `[VERDAD - ${currentCategory.toUpperCase()}]: ${randomQ}`;
      } else {
        activePlayer.truthCount = 0;
        const randomR = catData.retos[Math.floor(Math.random() * catData.retos.length)];
        document.getElementById('promptText').innerText = `[RETO - ${currentCategory.toUpperCase()}]: ${randomR}`;
      }
      
      document.getElementById('btnSwapRuleta').classList.remove('hidden');
      renderPlayers();
    }

    function displayJoke(forceNext = false) {
      hideOptionButtons();
      const list = baseDatos.chistes.verdades;
      const randomC = list[Math.floor(Math.random() * list.length)];
      lastJokeText = randomC;
      
      document.getElementById('promptText').innerText = "👇 ¡Presiona el botón para descubrir el remate!";
      document.getElementById('btnTalk').classList.remove('hidden');
      document.getElementById('btnFullAlexanderNext').classList.remove('hidden');
    }

    // SECUENCIA ÉPICA EN 3D PARA EL CHISTE
    function triggerComooSequence() {
      const overlay = document.getElementById('comooOverlay');
      const step1 = document.getElementById('animStep1');
      const step2 = document.getElementById('animStep2');
      const step3 = document.getElementById('animStep3');

      // Limpiar clases
      step1.className = "anim-text text-alex hidden";
      step2.className = "anim-text text-comoo hidden";
      step3.className = "anim-text text-punchline hidden";

      overlay.classList.remove('hidden');
      
      // Fase 1: A la flaca...
      step1.classList.remove('hidden');
      step1.classList.add('pop-out');
      if ('speechSynthesis' in window) {
        let u1 = new SpeechSynthesisUtterance("A la flaca de Alexander le dicen...");
        u1.lang = 'es-ES'; u1.rate = 1.1;
        window.speechSynthesis.speak(u1);
      }

      // Fase 2: ¿¿¿COMOOO???
      setTimeout(() => {
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
        step2.classList.add('pop-out');
      }, 1500);

      // Fase 3: Remate y Tambores Reales
      setTimeout(() => {
        step2.classList.add('hidden');
        step3.innerText = lastJokeText;
        step3.classList.remove('hidden');
        step3.classList.add('pop-stay'); // Se queda en pantalla

        if ('speechSynthesis' in window) {
          let u2 = new SpeechSynthesisUtterance(lastJokeText);
          u2.lang = 'es-ES'; u2.rate = 0.95;
          u2.onend = function() {
            // Reproducir batería real (ferfRClQKgY)
            if (drumPlayer && drumPlayer.seekTo) {
               drumPlayer.seekTo(0);
               drumPlayer.playVideo();
            }
            
            // Cerrar el overlay después de la risa
            setTimeout(() => {
               overlay.classList.add('hidden');
            }, 3000);
          };
          window.speechSynthesis.speak(u2);
        }
      }, 3200);
    }

    function swapPrompt() {
      if (!currentPromptType || currentPromptType === 'custom') return;
      
      const catData = baseDatos[currentCategory];
      if (currentPromptType === 'verdad') {
        const randomQ = catData.verdades[Math.floor(Math.random() * catData.verdades.length)];
        document.getElementById('promptText').innerText = `[NUEVA VERDAD - ${currentCategory.toUpperCase()}]: ${randomQ}`;
      } else if (currentPromptType === 'reto') {
        const randomR = catData.retos[Math.floor(Math.random() * catData.retos.length)];
        document.getElementById('promptText').innerText = `[NUEVO RETO - ${currentCategory.toUpperCase()}]: ${randomR}`;
      }
    }

    function failChallenge() {
      if (!activePlayer) return;

      activePlayer.lives--;
      alert(`💔 ¡${activePlayer.name} no cumplió y perdió 1 vida! Quedan: ${activePlayer.lives}`);

      if (activePlayer.lives <= 0) {
        alert(`☠️ ¡${activePlayer.name} se quedó sin vidas y fue eliminado!`);
        removePlayer(activePlayer.rawName);
      }

      hideOptionButtons();
      document.getElementById('actionTitle').innerText = "💀 TURNO FINALIZADO";
      document.getElementById('promptText').innerText = "Giren la ruleta para continuar la siguiente ronda.";
      renderPlayers();
    }
  </script>
