<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MITSUGAMES - Verdad o Reto Salón E5</title>
  <!-- Fuentes llamativas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,400;0,700;1,400;1,900&display=swap" rel="stylesheet">
  
  <!-- YouTube Iframe API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    :root {
      --primary: #8a2be2;
      --secondary: #ff007f;
      --bg: #070510;
      --card-bg: #130f26;
      --text: #ffffff;
      --danger: #ff0055;
      --success: #00e676;
      --accent: #00ffff;
      --warning: #ffbe0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    /* Fondo animado dinámico */
    body {
      background: radial-gradient(circle at center, #27144d 0%, #070510 100%);
      background-size: 200% 200%;
      animation: bgShift 15s ease infinite;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-bar {
      width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
    }

    .visits-counter {
      font-size: 0.8rem; background: rgba(255, 255, 255, 0.08); padding: 4px 12px; border-radius: 20px;
      backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); color: var(--accent); font-weight: bold;
    }

    .badge-cat {
      font-size: 0.7rem; background: linear-gradient(45deg, var(--primary), var(--secondary));
      padding: 4px 10px; border-radius: 12px; font-weight: 800; letter-spacing: 1px;
    }

    h1.logo {
      font-family: 'Bebas Neue', sans-serif;
      margin: 0 0 2px 0; font-size: 3.2rem; letter-spacing: 3px; line-height: 1;
      background: linear-gradient(135deg, #00ffff, #ff007f, #9d4edd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(255, 0, 127, 0.6); text-align: center;
      animation: neonPulse 2s infinite alternate;
    }

    @keyframes neonPulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(0,255,255,0.5)); }
      100% { transform: scale(1.02); filter: drop-shadow(0 0 18px rgba(255,0,127,0.9)); }
    }

    .sub-tag { text-align: center; font-size: 0.8rem; color: #bbb; margin-top: -4px; margin-bottom: 10px; letter-spacing: 1px; }
    .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }

    .card {
      background-color: var(--card-bg); padding: 14px; border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255, 255, 255, 0.1); position: relative; overflow: hidden;
    }

    .mode-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }

    button {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; color: white;
      padding: 9px 12px; font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      font-size: 0.82rem;
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,0,127,0.5); }
    button:active { transform: scale(0.95); }
    button.btn-danger { background: linear-gradient(45deg, #ff0055, #990033); }
    button.btn-success { background: linear-gradient(45deg, #00e676, #00897b); }
    button.btn-accent { background: linear-gradient(45deg, #00b4d8, #0077b6); }
    button.btn-swap { background: linear-gradient(45deg, #ffbe0b, #fb5607); color: #000; }
    
    /* Botón Misterioso (No hacer clic) */
    button.btn-mystery {
      background: linear-gradient(45deg, #ff0000, #990000); color: #fff; border: 1px solid rgba(255,255,255,0.4);
      animation: glowMystery 1s infinite alternate; font-weight: 900; letter-spacing: 1px;
    }
    @keyframes glowMystery {
      from { box-shadow: 0 0 5px #ff0000; transform: scale(1); }
      to { box-shadow: 0 0 15px #ff007f; transform: scale(1.02); }
    }

    .category-selector {
      display: flex; justify-content: space-around; gap: 5px; margin-bottom: 10px;
      background: rgba(0,0,0,0.4); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap;
    }

    .cat-btn {
      background: transparent; box-shadow: none; font-size: 0.75rem; padding: 5px 6px;
      border-radius: 8px; color: #888; border: 1px solid transparent; flex: 1; min-width: 60px; font-weight: bold;
    }

    .cat-btn.active {
      background: var(--card-bg); color: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0,255,255,0.4);
    }

    .cat-btn.locked { color: #ffbe0b; position: relative; cursor: pointer; }

    .player-input { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type="text"] {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #3d3566;
      background: #1b1538; color: white; outline: none; font-size: 0.9rem; font-weight: bold;
    }

    .player-tags { display: flex; flex-wrap: wrap; gap: 6px; max-height: 120px; overflow-y: auto; padding-right: 4px; }
    
    .tag {
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.2px; font-size: 1.1rem;
      background: linear-gradient(135deg, #2a1a58, #181135); padding: 5px 12px; border-radius: 18px;
      display: flex; align-items: center; gap: 6px; border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: popIn 0.3s ease;
    }
    @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    
    .tag .lives { color: var(--warning); font-size: 0.85rem; font-family: 'Poppins', sans-serif; font-weight: bold; }
    .tag span.remove { cursor: pointer; color: var(--secondary); font-weight: bold; margin-left: 4px; font-size: 1.1rem; }

    .game-area { height: 230px; display: flex; justify-content: center; align-items: center; position: relative; }

    .can-container {
      position: relative; width: 120px; height: 200px;
      display: flex; justify-content: center; align-items: center;
      transition: transform 3.5s cubic-bezier(0.12, 0.8, 0.15, 1);
    }

    /* BOTELLA FLOTANTE */
    .custom-bottle-img {
      width: 100%; height: 210px; object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.5));
      animation: floatBottle 3s ease-in-out infinite;
    }
    @keyframes floatBottle {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .roulette-display {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px;
      color: var(--accent); min-height: 48px; display: flex; align-items: center; justify-content: center;
      text-align: center; text-shadow: 0 0 15px var(--accent);
      background: rgba(0,0,0,0.35); border-radius: 12px; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.05);
    }

    .result-box { text-align: center; min-height: 160px; display: flex; flex-direction: column; justify-content: center; gap: 8px; position: relative; }
    
    .joke-header {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px;
      color: var(--warning); text-shadow: 0 0 15px rgba(255, 190, 11, 0.9), 3px 3px 0px #000; margin-bottom: 4px;
      animation: text3D 1s ease infinite alternate;
    }

    @keyframes text3D {
      0% { transform: scale(1) translateZ(0); text-shadow: 0 0 15px rgba(255, 190, 11, 0.9), 3px 3px 0px #000; }
      100% { transform: scale(1.05) translateZ(20px); text-shadow: 0 0 25px rgba(255, 0, 127, 1), 6px 6px 0px #000; }
    }

    /* OVERLAY Y ANIMACIONES 3D IMPACTANTES */
    .comoo-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(5, 2, 15, 0.92); display: flex; justify-content: center; align-items: center;
      z-index: 9999; pointer-events: none; perspective: 1000px;
    }

    .anim-text {
      position: absolute; width: 90%; text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      transform-style: preserve-3d; opacity: 0;
    }

    .text-alex { font-size: 3.5rem; color: #00ffff; text-shadow: 0 0 20px #00ffff, 4px 4px 0px #000; letter-spacing: 2px; }
    .text-comoo { font-size: 5.5rem; color: #ff007f; text-shadow: 0 0 25px #ff007f, 6px 6px 0px #000; letter-spacing: 5px; }
    .text-punchline { font-size: 3.2rem; color: #ffbe0b; text-shadow: 0 0 20px #ffbe0b, 4px 4px 0px #000; letter-spacing: 1px; }

    .pop-out { animation: popOutSeq 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes popOutSeq {
      0% { transform: scale(0.1) rotateX(60deg) translateZ(-600px); opacity: 0; }
      40% { transform: scale(1.5) rotateX(0deg) translateZ(150px); opacity: 1; }
      70% { transform: scale(1.2) rotateZ(-6deg) translateZ(80px); opacity: 1; }
      100% { transform: scale(2.4) translateZ(400px); opacity: 0; }
    }

    .pop-stay { animation: popOutStay 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes popOutStay {
      0% { transform: scale(0.1) translateZ(-500px); opacity: 0; }
      100% { transform: scale(1) translateZ(0px); opacity: 1; }
    }

    .prompt-text { font-size: 1.1rem; font-style: italic; color: #eee; padding: 0 8px; line-height: 1.4; }
    .choice-btns { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
    .hidden { display: none !important; }

    .winner-flash { animation: flashAnim 0.5s ease 2; }
    @keyframes flashAnim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); color: #ff007f; }
    }

    /* REPRODUCTOR YOUTUBE / LOCAL */
    .yt-section {
      width: 100%; max-width: 500px;
      background: rgba(13, 10, 30, 0.9); border: 1px solid rgba(255,255,255,0.12);
      padding: 12px; border-radius: 18px; display: flex; flex-direction: column; gap: 10px; margin-top: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.8);
    }

    .yt-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: #ff0000;
      letter-spacing: 1.5px; display: flex; align-items: center; gap: 6px;
    }

    .music-search-row { display: flex; gap: 8px; flex-wrap: wrap;}
    .music-input {
      flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #3d3566;
      background: #191338; color: white; font-size: 0.85rem; outline: none; font-weight: bold; min-width: 100%;
    }

    .btn-music-mini {
      flex: 1; padding: 8px 6px; font-size: 0.8rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;
      background: #281e50; color: #fff; display: flex; align-items: center; justify-content: center;
    }
    .btn-music-mini:hover { background: var(--primary); }

    .video-container {
      width: 100%; min-height: 120px; border-radius: 12px; overflow: hidden;
      background: #05030f; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .video-container iframe { width: 100%; height: 210px; border: none; }

    /* ECUALIZADOR ANIMADO PARA MÚSICA LOCAL */
    .eq-container {
      display: flex; gap: 5px; height: 50px; align-items: flex-end; margin-bottom: 10px;
    }
    .eq-bar {
      width: 12px; background: linear-gradient(to top, #00ffff, #ff007f);
      border-radius: 4px 4px 0 0; animation: eqAnim 0.5s ease infinite alternate;
    }
    @keyframes eqAnim {
      0% { height: 10px; }
      100% { height: 50px; }
    }
  </style>
</head>
<body>

  <!-- Audios Locales de GitHub -->
  <audio id="risaAudio" src="ROSA.mp3" preload="auto"></audio>

  <!-- Reproductor oculto de Batería YouTube (Ba-Dum-Tss) de respaldo -->
  <div id="drumPlayerDiv" style="position:absolute; top:-9999px; left:-9999px; width:0; height:0;"></div>

  <div class="header-bar">
    <div class="visits-counter">👁️ Visitas: <span id="visitCount">1</span></div>
    <div class="badge-cat">CATEGORÍA: RULETA</div>
  </div>

  <h1 class="logo">MITSUGAMES</h1>
  <div class="sub-tag">🔥 VERDAD O RETO • SALÓN E5 🔥</div>

  <div class="container">
    <div class="card">
      <div class="mode-selector">
        <button onclick="setMode('botella')">🍾 Modo Botella</button>
        <button onclick="setMode('ruleta')">🎯 Ruleta (Vidas)</button>
      </div>

      <div class="category-selector">
        <button class="cat-btn active" id="cat-picante" onclick="setCategory('picante')">🔥 Picante</button>
        <button class="cat-btn" id="cat-curiosidad" onclick="setCategory('curiosidad')">👀 Curiosidad</button>
        <button class="cat-btn" id="cat-amistad" onclick="setCategory('amistad')">🤝 Amistad</button>
        <button class="cat-btn" id="cat-pacifico" onclick="setCategory('pacifico')">🕊️ Pacífico</button>
        <button class="cat-btn locked" id="cat-chistes-lock" ondblclick="unlockChistes()">🔒 Secret</button>
        <button class="cat-btn hidden" id="cat-chistes" onclick="setCategory('chistes')">😂 Alexander</button>
      </div>

      <div class="player-input">
        <input type="text" id="playerName" placeholder="Nombre del compañero..." onkeydown="if(event.key==='Enter') addPlayer()">
        <button onclick="addPlayer()">➕ AÑADIR</button>
      </div>

      <div class="player-tags" id="playerList"></div>
    </div>

    <!-- Área de la Botella (Oculta si es Full Chistes Alexander) -->
    <div class="card game-area" id="gameAreaCard">
      <div id="canContainer" class="can-container">
        <!-- BOTELLA RUSKAYA ACTUALIZADA -->
        <img src="https://i.ibb.co/DPsH6fFz/Captura-de-pantalla-2026-07-22-012750.png" alt="Botella Ruskaya" class="custom-bottle-img">
      </div>
    </div>

    <div class="card" style="text-align: center;" id="spinBtnCard">
      <button id="spinBtn" onclick="spin()" style="font-size: 1.25rem; width: 100%; padding: 12px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;">🎲 ¡GIRAR RULETA! 🎲</button>
    </div>

    <div class="card result-box">
      <div id="actionTitle" class="roulette-display">AÑADE JUGADORES Y PRESIONA GIRAR</div>
      
      <!-- Display grande en 3D para chistes -->
      <div id="jokeHeader" class="joke-header hidden">😂 PREPÁRATE...</div>
      <div id="promptText" class="prompt-text"></div>
      
      <div id="botellaOptions" class="choice-btns hidden">
        <button id="btnVerdadBotella" class="btn-success" onclick="getBottlePrompt('verdad')">❓ Verdad</button>
        <button id="btnRetoBotella" onclick="getBottlePrompt('reto')">🔥 Reto</button>
        <button id="btnHiddenJokeBotella" class="btn-mystery" onclick="getBottlePrompt('chiste')">🚫 NO HACER CLIC PORFAVOR</button>
        <button id="btnSwapBotella" class="btn-swap hidden" onclick="swapPrompt()">🔄 Cambiar Opción</button>
      </div>

      <div id="ruletaOptions" class="choice-btns hidden">
        <button id="btnVerdad" class="btn-success" onclick="chooseType('verdad')">❓ Verdad</button>
        <button id="btnReto" onclick="chooseType('reto')">🔥 Reto</button>
        <button id="btnHiddenJokeRuleta" class="btn-mystery" onclick="chooseType('chiste')">🚫 NO HACER CLIC PORFAVOR</button>
        <button id="btnSwapRuleta" class="btn-swap hidden" onclick="swapPrompt()">🔄 Cambiar Opción</button>
        <button class="btn-danger" onclick="failChallenge()">💔 Perder Vida</button>
      </div>

      <!-- BOTÓN ¡¿COMOO?! 😱 (Solo visible en secuencia de chistes) -->
      <button id="btnTalk" class="btn-comoo hidden" onclick="triggerComooSequence()">¡¿COMOO?! 😱</button>

      <!-- Botón directo si están en MODO FULL ALEXANDER -->
      <button id="btnFullAlexanderNext" class="btn-swap hidden" onclick="displayJoke(true)" style="width:100%; font-size: 1.1rem; padding: 12px; margin-top: 5px;">🔄 ¡Siguiente Chiste de Alexander!</button>
    </div>

    <!-- REPRODUCTOR Y BUSCADOR COMPLETO DE YOUTUBE / AUDIO LOCAL -->
    <div class="yt-section">
      <div class="yt-title">📺 MÚSICA & REPRODUCTOR YOUTUBE</div>
      <div class="music-search-row">
        <input type="text" id="ytUrl" class="music-input" placeholder="Pega un Link/ID de YouTube o déjalo vacío para Local" onkeydown="if(event.key==='Enter') controlMusic('search')">
      </div>
      <div class="music-search-row">
        <button class="btn-music-mini" onclick="controlMusic('search')" style="background: #ff0000;">🔎 Buscar YT</button>
        <button class="btn-music-mini" onclick="controlMusic('play')">▶️ Play/Cont</button>
        <button class="btn-music-mini" onclick="controlMusic('pause')">⏸️ Parar</button>
        <button class="btn-music-mini" onclick="controlMusic('next')">⏭️ Saltar</button>
      </div>
      <div id="videoDisplay" class="video-container" style="display:none;"></div>
    </div>

  </div>

  <!-- OVERLAY CON SECUENCIA 3D COMPLETA -->
  <div id="comooOverlay" class="comoo-overlay hidden">
    <div id="animStep1" class="anim-text text-alex hidden">A LA FLACA DE ALEXANDER LE DICEEEEN...</div>
    <div id="animStep2" class="anim-text text-comoo hidden">¿¿¿COMOOOOO??? 😱</div>
    <div id="animStep3" class="anim-text text-punchline hidden"></div>
  </div>

  <script>
    let players = [];
    let currentMode = 'botella';
    let currentCategory = 'picante';
    let isSpinning = false;
    let currentRotation = 0;
    let activePlayer = null;
    let targetPlayer = null;
    let currentPromptType = null;
    let lockClicks = 0;
    let isChistesUnlocked = false;
    let lastJokeText = "";

    // VARIABLE PARA CONTROLAR EL VOLUMEN DEL IFRAME DE YT
    let mainYtPlayer = null;

    const emojisRandom = ["😎", "🔥", "⚡", "👑", "💥", "🤪", "🦁", "🍻", "🥳", "😈", "🚀", "🎯", "✨", "🍿"];

    // ============================================
    // SISTEMA DE MÚSICA LOCAL EN GITHUB Y ECUALIZADOR
    // ============================================
    let localPlayer = new Audio();
    let currentTrackIdx = 0;
    
    // Lista de MP3 Locales (Asegúrate de que el nombre del segundo MP3 coincida en GitHub)
    const playlist = [
      "123113123.mp3",
      "Top Abril 2026 - Dichavate, Gatita suelta, Cheve.mp3" 
    ]; 
    localPlayer.src = playlist[currentTrackIdx];
    localPlayer.loop = false;

    localPlayer.addEventListener('ended', () => {
        currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
        localPlayer.src = playlist[currentTrackIdx];
        localPlayer.play();
    });

    function getEqualizerHTML() {
      return `
        <div class="eq-container">
          <div class="eq-bar" style="animation-delay: 0.1s"></div>
          <div class="eq-bar" style="animation-delay: 0.4s"></div>
          <div class="eq-bar" style="animation-delay: 0.2s"></div>
          <div class="eq-bar" style="animation-delay: 0.5s"></div>
          <div class="eq-bar" style="animation-delay: 0.3s"></div>
        </div>
        <div style="color:var(--accent); font-weight:bold; font-size:1.1rem; text-align:center;">🎵 MÚSICA LOCAL ACTIVA<br><span style="color:#fff; font-size:0.8rem; font-weight:normal;">Reproduciendo desde GitHub</span></div>
      `;
    }

    // CONTROL GLOBAL DE VOLUMEN (DUCKING)
    function lowerMusicVolume() {
      // Bajamos el volumen de la música local al 5%
      localPlayer.volume = 0.05;
      
      // Bajamos el volumen del reproductor de YouTube al 5%
      if (mainYtPlayer && typeof mainYtPlayer.setVolume === 'function') {
        try { mainYtPlayer.setVolume(5); } catch(e) {}
      }
    }

    function restoreMusicVolume() {
      // Restauramos el volumen de la música local al 100%
      localPlayer.volume = 1.0;
      
      // Restauramos el volumen del reproductor de YouTube al 100%
      if (mainYtPlayer && typeof mainYtPlayer.setVolume === 'function') {
        try { mainYtPlayer.setVolume(100); } catch(e) {}
      }
    }

    // INICIALIZACIÓN API YOUTUBE (BATERÍA REAL)
    let drumPlayer;
    function onYouTubeIframeAPIReady() {
      drumPlayer = new YT.Player('drumPlayerDiv', {
        height: '0',
        width: '0',
        videoId: 'ferfRClQKgY', 
        playerVars: { 'autoplay': 0, 'controls': 0 }
      });
    }

    function controlMusic(action) {
       const urlInput = document.getElementById('ytUrl').value.trim();
       const ytContainer = document.getElementById('videoDisplay');
       
       if(urlInput === "" || (!urlInput.includes("youtube") && !urlInput.includes("youtu.be"))) {
           // MÚSICA LOCAL
           ytContainer.style.display = "flex";
           ytContainer.innerHTML = getEqualizerHTML();
           
           if(action === 'play' || action === 'search') localPlayer.play();
           if(action === 'pause') {
              localPlayer.pause();
              ytContainer.innerHTML = `<div style="color:#ffbe0b; font-weight:bold; font-size:1.1rem; text-align:center;">⏸️ MÚSICA LOCAL PAUSADA</div>`;
           }
           if(action === 'next') {
               currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
               localPlayer.src = playlist[currentTrackIdx];
               localPlayer.play();
               ytContainer.innerHTML = getEqualizerHTML();
           }
       } else {
           // YOUTUBE MÚSICA
           localPlayer.pause();
           ytContainer.style.display = "flex";
           let videoId = "";
           let isSearch = false;
           
           if (urlInput.includes("v=")) { 
               videoId = urlInput.split("v=")[1].split("&")[0]; 
           } else if (urlInput.includes("youtu.be/")) { 
               videoId = urlInput.split("youtu.be/")[1].split("?")[0]; 
           } else { 
               videoId = encodeURIComponent(urlInput);
               isSearch = true; 
           }

    function playSpinSound() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      let speed = 60;
      let count = 0;
      
      function playClick() {
        if (count > 25) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square'; // Sonido cuadrado más fuerte y notorio
        osc.frequency.setValueAtTime(500 + (count * 15), ctx.currentTime);
        gain.gain.setValueAtTime(0.8, ctx.currentTime); // Volumen alto
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);

        count++;
        speed += 10;
        setTimeout(playClick, speed);
      }
      playClick();
    }

        const fullName = `${selectedEmoji} ${name}`;

        if (!players.find(p => p.rawName === name)) {
          players.push({ name: fullName, rawName: name, lives: 3, truthCount: 0 });
          input.value = '';
          renderPlayers();
        }
      }
    }

    function removePlayer(rawName) {
      players = players.filter(p => p.rawName !== rawName);
      renderPlayers();
    }

    function renderPlayers() {
      const list = document.getElementById('playerList');
      list.innerHTML = players.map(p => `
        <div class="tag">
          ${p.name} ${currentMode === 'ruleta' ? `<span class="lives">❤️${p.lives}</span>` : ''}
          <span class="remove" onclick="removePlayer('${p.rawName}')">&times;</span>
        </div>
      `).join('');
    }

    function setMode(mode) {
      currentMode = mode;
      hideOptionButtons();
      document.getElementById('actionTitle').innerText = mode === 'botella' ? '🍾 MODO BOTELLA GIRATORIA' : '🎯 MODO RULETA DIRECTA';
      document.getElementById('promptText').innerText = '';
      renderPlayers();
      
      if(currentCategory === 'chistes'){
         setCategory('chistes');
      }
    }

    function setCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`cat-${cat}`);
      if (activeBtn) activeBtn.classList.add('active');
      
      const gameAreaCard = document.getElementById('gameAreaCard');
      const spinBtnCard = document.getElementById('spinBtnCard');
      const btnFullAlexanderNext = document.getElementById('btnFullAlexanderNext');

      if (cat === 'chistes') {
        gameAreaCard.classList.add('hidden');
        spinBtnCard.classList.add('hidden');
        btnFullAlexanderNext.classList.remove('hidden');
        document.getElementById('actionTitle').innerText = "😂 MODO FULL CHISTES DE ALEXANDER";
        displayJoke();
      } else {
        gameAreaCard.classList.remove('hidden');
        spinBtnCard.classList.remove('hidden');
        btnFullAlexanderNext.classList.add('hidden');
        hideOptionButtons();
        document.getElementById('promptText').innerText = "Giren la botella o ruleta para empezar.";
      }
    }

    function hideOptionButtons() {
      document.getElementById('botellaOptions').classList.add('hidden');
      document.getElementById('ruletaOptions').classList.add('hidden');
      document.getElementById('btnSwapBotella').classList.add('hidden');
      document.getElementById('btnSwapRuleta').classList.add('hidden');
      document.getElementById('jokeHeader').classList.add('hidden');
      document.getElementById('btnTalk').classList.add('hidden');
      document.getElementById('btnFullAlexanderNext').classList.add('hidden');
    }

    function spin() {
      if (players.length < 2) {
        alert("⚠️ ¡Añade al menos 2 jugadores para poder jugar!");
        return;
      }
      if (isSpinning) return;

      isSpinning = true;
      hideOptionButtons();
      document.getElementById('promptText').innerText = '';

      playSpinSound();

      if (currentMode === 'botella') {
        let rouletteInterval = setInterval(() => {
          const randA = players[Math.floor(Math.random() * players.length)].name;
          let randB;
          do {
            randB = players[Math.floor(Math.random() * players.length)].name;
          } while (randA === randB && players.length > 1);

          document.getElementById('actionTitle').innerHTML = `👉 ${randA} ➔ ${randB}`;
        }, 70);

        const extraSpins = 5 + Math.floor(Math.random() * 5);
        const randomDegree = Math.floor(Math.random() * 360);
        currentRotation += (extraSpins * 360) + randomDegree;
        document.getElementById('canContainer').style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(rouletteInterval);
          isSpinning = false;
          processBotellaResult();
        }, 3500);

      } else {
        let rouletteInterval = setInterval(() => {
          const rand = players[Math.floor(Math.random() * players.length)].name;
          document.getElementById('actionTitle').innerText = `🎯 ${rand}`;
        }, 70);

        const extraSpins = 5 + Math.floor(Math.random() * 5);
        const randomDegree = Math.floor(Math.random() * 360);
        currentRotation += (extraSpins * 360) + randomDegree;
        document.getElementById('canContainer').style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(rouletteInterval);
          isSpinning = false;
          processRuletaResult();
        }, 3500);
      }
    }

    function processBotellaResult() {
      let indexA = Math.floor(Math.random() * players.length);
      let indexB;
      do {
        indexB = Math.floor(Math.random() * players.length);
      } while (indexA === indexB);

      activePlayer = players[indexA].name;
      targetPlayer = players[indexB].name;

      const titleEl = document.getElementById('actionTitle');
      titleEl.innerHTML = `👉 <span style="color:#00ffff">${activePlayer}</span> ➔ <span style="color:#ff007f">${targetPlayer}</span>`;
      titleEl.classList.add('winner-flash');
      setTimeout(() => titleEl.classList.remove('winner-flash'), 1000);

      document.getElementById('promptText').innerText = `¡${activePlayer}, decide qué reto o verdad cumplirá ${targetPlayer}!`;
      document.getElementById('botellaOptions').classList.remove('hidden');
    }

    function processRuletaResult() {
      const randomIndex = Math.floor(Math.random() * players.length);
      activePlayer = players[randomIndex];

      const titleEl = document.getElementById('actionTitle');
      titleEl.innerHTML = `🎯 TURNO DE: <span style="color:#00ffff">${activePlayer.name}</span> (❤️ ${activePlayer.lives})`;
      titleEl.classList.add('winner-flash');
      setTimeout(() => titleEl.classList.remove('winner-flash'), 1000);

      document.getElementById('promptText').innerText = `Llevas ${activePlayer.truthCount}/3 Verdades seguidas en modo ${currentCategory.toUpperCase()}.`;

      const btnVerdad = document.getElementById('btnVerdad');
      if (activePlayer.truthCount >= 3) {
        btnVerdad.disabled = true;
        btnVerdad.innerText = "❓ Verdad (Límite 3/3)";
      } else {
        btnVerdad.disabled = false;
        btnVerdad.innerText = `❓ Verdad (${activePlayer.truthCount}/3)`;
      }

      document.getElementById('ruletaOptions').classList.remove('hidden');
    }

    function getBottlePrompt(type) {
      currentPromptType = type;
      const catData = baseDatos[currentCategory];

      if (type === 'verdad') {
        const randomQ = catData.verdades[Math.floor(Math.random() * catData.verdades.length)];
        document.getElementById('promptText').innerText = `[VERDAD - ${currentCategory.toUpperCase()}]: ${randomQ}`;
        document.getElementById('btnSwapBotella').classList.remove('hidden');
      } else if (type === 'reto') {
        const randomR = catData.retos[Math.floor(Math.random() * catData.retos.length)];
        document.getElementById('promptText').innerText = `[RETO - ${currentCategory.toUpperCase()}]: ${randomR}`;
        document.getElementById('btnSwapBotella').classList.remove('hidden');
      } else if (type === 'chiste') {
        hideOptionButtons();
        displayJoke(true, true);
      }
    }

    function chooseType(type) {
      if (!activePlayer) return;
      currentPromptType = type;
      const catData = baseDatos[currentCategory];

      if (type === 'verdad') {
        activePlayer.truthCount++;
        const randomQ = catData.verdades[Math.floor(Math.random() * catData.verdades.length)];
        document.getElementById('promptText').innerText = `[VERDAD - ${currentCategory.toUpperCase()}]: ${randomQ}`;
        document.getElementById('btnSwapRuleta').classList.remove('hidden');
      } else if (type === 'chiste') {
        hideOptionButtons();
        displayJoke(true, true);
      } else {
        activePlayer.truthCount = 0;
        const randomR = catData.retos[Math.floor(Math.random() * catData.retos.length)];
        document.getElementById('promptText').innerText = `[RETO - ${currentCategory.toUpperCase()}]: ${randomR}`;
        document.getElementById('btnSwapRuleta').classList.remove('hidden');
      }
      renderPlayers();
    }

    function displayJoke(forceNext = false, fromMystery = false) {
      hideOptionButtons();
      const list = baseDatos.chistes.verdades;
      
      // Hacemos que la selección aleatoria favorezca muchísimo (90% de las veces) a los primeros 13 (los originales/clásicos)
      let randomIdx = 0;
      if (Math.random() < 0.9) {
          randomIdx = Math.floor(Math.random() * 13);
      } else {
          randomIdx = Math.floor(Math.random() * list.length);
      }
      
      lastJokeText = list[randomIdx];
      
      document.getElementById('promptText').innerText = "👇 ¡Presiona el botón para descubrir el remate!";
      document.getElementById('btnTalk').classList.remove('hidden');
      
      if (currentCategory === 'chistes') {
        document.getElementById('btnFullAlexanderNext').classList.remove('hidden');
      }
    }

    // SECUENCIA ÉPICA EN 3D PARA EL CHISTE
    function triggerComooSequence(fromMystery) {
      const overlay = document.getElementById('comooOverlay');
      const step1 = document.getElementById('animStep1');
      const step2 = document.getElementById('animStep2');
      const step3 = document.getElementById('animStep3');

      // Limpiar clases
      step1.className = "anim-text text-alex hidden";
      step2.className = "anim-text text-comoo hidden";
      step3.className = "anim-text text-punchline hidden";

      overlay.classList.remove('hidden');
      
      // Ducking de audio: bajar música general al 5%
      lowerMusicVolume();

      // Fase 1: A la flaca...
      step1.classList.remove('hidden');
      step1.classList.add('pop-out');
      if ('speechSynthesis' in window) {
        let u1 = new SpeechSynthesisUtterance("A la flaca de Alexander le dicen...");
        u1.lang = 'es-ES'; u1.rate = 1.1; u1.volume = 1.0;
        window.speechSynthesis.speak(u1);
      }

      // Fase 2: ¿¿¿COMOOO???
      setTimeout(() => {
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
        step2.classList.add('pop-out');
      }, 1500);

      // Fase 3: Remate y Tambores/Audio Local
      setTimeout(() => {
        step2.classList.add('hidden');
        step3.innerText = lastJokeText;
        step3.classList.remove('hidden');
        step3.classList.add('pop-stay'); // Se queda en pantalla

        if ('speechSynthesis' in window) {
          let u2 = new SpeechSynthesisUtterance(lastJokeText);
          u2.lang = 'es-ES'; u2.rate = 0.95; u2.volume = 1.0;
          u2.onend = function() {
            
            // Reproducir Audio Local ROSA.mp3 de Github o Batería de YT
            const risaPlayer = document.getElementById('risaAudio');
            risaPlayer.currentTime = 0;
            risaPlayer.volume = 1.0;
            risaPlayer.play().catch(e => {
                // Failsafe por si el audio local no carga, usa YT
                if (drumPlayer && drumPlayer.seekTo) {
                   drumPlayer.seekTo(0);
                   drumPlayer.playVideo();
                }
            });
            
            // Cerrar el overlay después de la risa
            setTimeout(() => {
               overlay.classList.add('hidden');
               restoreMusicVolume();
               
               if (currentCategory === 'chistes' || fromMystery) {
                 document.getElementById('jokeHeader').classList.remove('hidden');
                 document.getElementById('promptText').innerText = lastJokeText;
               }
               
               if(currentCategory === 'chistes') {
                   document.getElementById('btnFullAlexanderNext').classList.remove('hidden');
               } else if (fromMystery) {
                   if (currentMode === 'botella') {
                       document.getElementById('botellaOptions').classList.remove('hidden');
                   } else {
                       document.getElementById('ruletaOptions').classList.remove('hidden');
                   }
               }

            }, 3000);
          };
          window.speechSynthesis.speak(u2);
        }
      }, 3200);
    }

    function swapPrompt() {
      if (!currentPromptType || currentPromptType === 'custom') return;
      
      const catData = baseDatos[currentCategory];
      if (currentPromptType === 'verdad') {
        const randomQ = catData.verdades[Math.floor(Math.random() * catData.verdades.length)];
        document.getElementById('promptText').innerText = `[NUEVA VERDAD - ${currentCategory.toUpperCase()}]: ${randomQ}`;
      } else if (currentPromptType === 'reto') {
        const randomR = catData.retos[Math.floor(Math.random() * catData.retos.length)];
        document.getElementById('promptText').innerText = `[NUEVO RETO - ${currentCategory.toUpperCase()}]: ${randomR}`;
      }
    }

    function failChallenge() {
      if (!activePlayer) return;

      activePlayer.lives--;
      alert(`💔 ¡${activePlayer.name} no cumplió y perdió 1 vida! Quedan: ${activePlayer.lives}`);

      if (activePlayer.lives <= 0) {
        alert(`☠️ ¡${activePlayer.name} se quedó sin vidas y fue eliminado!`);
        removePlayer(activePlayer.rawName);
      }

      hideOptionButtons();
      document.getElementById('actionTitle').innerText = "💀 TURNO FINALIZADO";
      document.getElementById('promptText').innerText = "Giren la ruleta para continuar la siguiente ronda.";
      renderPlayers();
    }
  </script>
</body>
