<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verdad o Reto - Salón E5</title>
  <style>
    :root {
      --primary: #8a2be2;
      --secondary: #ff007f;
      --bg: #121214;
      --card-bg: #1e1e24;
      --text: #ffffff;
      --danger: #ff4444;
      --success: #00c851;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    h1 { margin-bottom: 10px; color: var(--secondary); text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); text-align: center; }

    .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }

    .card {
      background-color: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .mode-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }

    button {
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      padding: 10px 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.95); }
    button.btn-danger { background: var(--danger); }
    button.btn-success { background: var(--success); }

    .player-input { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type="text"] {
      flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #333;
      background: #2a2a32; color: white;
    }

    .player-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      background: #333344; padding: 6px 12px; border-radius: 15px;
      font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
    }
    .tag .lives { color: #ffbb33; font-weight: bold; }
    .tag span.remove { cursor: pointer; color: var(--secondary); font-weight: bold; }

    .game-area {
      height: 200px; display: flex; justify-content: center; align-items: center; position: relative;
    }

    .bottle {
      width: 40px; height: 140px; background: #2e7d32; border-radius: 10px 10px 20px 20px;
      position: relative; transition: transform 3s cubic-bezier(0.15, 0.9, 0.25, 1);
      box-shadow: inset -4px 0 8px rgba(0,0,0,0.5);
    }
    .bottle::before { content: ''; position: absolute; top: -18px; left: 12px; width: 16px; height: 20px; background: #2e7d32; }
    .bottle::after { content: ''; position: absolute; top: -22px; left: 10px; width: 20px; height: 5px; background: #c62828; }

    .result-box { text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
    .action-title { font-size: 1.2rem; font-weight: bold; color: #00ffff; }
    .prompt-text { font-size: 1rem; font-style: italic; color: #ddd; }
    .status-badge { font-size: 0.8rem; background: #333; padding: 4px 8px; border-radius: 10px; display: inline-block; }

    .choice-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <h1>🍾 Botella & Ruleta - E5</h1>

  <div class="container">
    <!-- Selección de Modo y Jugadores -->
    <div class="card">
      <div class="mode-selector">
        <button onclick="setMode('botella')">Modo Botella</button>
        <button onclick="setMode('ruleta')">Modo Ruleta (Vidas)</button>
      </div>

      <div class="player-input">
        <input type="text" id="playerName" placeholder="Nombre del compañero..." onkeydown="if(event.key==='Enter') addPlayer()">
        <button onclick="addPlayer()">Añadir</button>
      </div>

      <div class="player-tags" id="playerList"></div>
    </div>

    <!-- Tablero Animado -->
    <div class="card game-area">
      <div id="bottle" class="bottle"></div>
    </div>

    <!-- Botón Girar -->
    <div class="card" style="text-align: center;">
      <button id="spinBtn" onclick="spin()" style="font-size: 1.2rem; width: 100%; padding: 12px;">¡GIRAR!</button>
    </div>

    <!-- Panel de Resultados -->
    <div class="card result-box">
      <div id="actionTitle" class="action-title">Añade jugadores y presiona Girar</div>
      <div id="promptText" class="prompt-text"></div>
      
      <!-- Opciones dinámicas para el Modo Ruleta -->
      <div id="ruletaOptions" class="choice-btns hidden">
        <button id="btnVerdad" class="btn-success" onclick="chooseType('verdad')">Verdad</button>
        <button id="btnReto" onclick="chooseType('reto')">Reto</button>
        <button class="btn-danger" onclick="failChallenge()">Perder Vida 💔</button>
      </div>
    </div>
  </div>

  <script>
    let players = []; // Estructura: { name: "", lives: 3, truthCount: 0 }
    let currentMode = 'botella';
    let isSpinning = false;
    let currentRotation = 0;
    let activePlayer = null;

    // Bancos de preguntas
    const verdades = [
      "¿Quién de esta sala te parece más atractivo/a?",
      "¿Has fingido que te caía bien alguien de la universidad?",
      "¿Cuál ha sido tu momento más vergonzoso en clase?",
      "¿Alguna vez te ha gustado la pareja o ex de alguien presente?",
      "¿Qué es lo más atrevido que has hecho en la universidad?",
      "¿Con quién del salón pasarías una noche entera a solas?",
      "¿Qué es lo primero que le miras a alguien cuando te gusta?",
      "¿Has copiado en un examen de este ciclo y de quién?"
    ];

    const retos = [
      "Envía un audio coqueteando a tu último contacto de WhatsApp.",
      "Susúrrale algo atrevido al oído a la persona a tu derecha.",
      "Dale un abrazo de 10 segundos a la persona que elijas del salón.",
      "Muestra la última foto guardada en tu galería.",
      "Ponte de foto de perfil en WhatsApp una selfie elegida por el grupo por 30 mins.",
      "Dedícale una frase coqueta a la persona que esté frente a ti.",
      "Sienta a alguien en tu regazo durante las próximas 2 rondas."
    ];

    function addPlayer() {
      const input = document.getElementById('playerName');
      const name = input.value.trim();
      if (name && !players.find(p => p.name === name)) {
        players.push({ name: name, lives: 3, truthCount: 0 });
        input.value = '';
        renderPlayers();
      }
    }

    function removePlayer(name) {
      players = players.filter(p => p.name !== name);
      renderPlayers();
    }

    function renderPlayers() {
      const list = document.getElementById('playerList');
      list.innerHTML = players.map(p => `
        <div class="tag">
          ${p.name} ${currentMode === 'ruleta' ? `<span class="lives">❤️${p.lives}</span>` : ''}
          <span class="remove" onclick="removePlayer('${p.name}')">&times;</span>
        </div>
      `).join('');
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('ruletaOptions').classList.add('hidden');
      document.getElementById('actionTitle').innerText = `Modo: ${mode === 'botella' ? 'Botella (Pregunta / Responde)' : 'Ruleta con Vidas'}`;
      document.getElementById('promptText').innerText = '';
      renderPlayers();
    }

    function spin() {
      if (players.length < 2) {
        alert("¡Añade al menos 2 jugadores!");
        return;
      }
      if (isSpinning) return;

      isSpinning = true;
      document.getElementById('ruletaOptions').classList.add('hidden');
      document.getElementById('promptText').innerText = "Girando...";
      document.getElementById('actionTitle').innerText = "???";

      const extraSpins = 5 + Math.floor(Math.random() * 5);
      const randomDegree = Math.floor(Math.random() * 360);
      currentRotation += (extraSpins * 360) + randomDegree;

      document.getElementById('bottle').style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        processResult();
      }, 3000);
    }

    function processResult() {
      if (currentMode === 'botella') {
        // MODO BOTELLA: Dos jugadores al azar
        let indexA = Math.floor(Math.random() * players.length);
        let indexB;
        do {
          indexB = Math.floor(Math.random() * players.length);
        } while (indexA === indexB);

        const askPlayer = players[indexA].name;
        const answerPlayer = players[indexB].name;

        document.getElementById('actionTitle').innerText = `👉 ${askPlayer} le pregunta a ${answerPlayer}`;
        document.getElementById('promptText').innerText = `¡${askPlayer}, elige si le pides Verdad o Reto a ${answerPlayer}!`;

      } else {
        // MODO RULETA (VIDAS Y LÍMITE DE VERDADES)
        const randomIndex = Math.floor(Math.random() * players.length);
        activePlayer = players[randomIndex];

        document.getElementById('actionTitle').innerText = `Turno de: ${activePlayer.name} (❤️ ${activePlayer.lives})`;
        document.getElementById('promptText').innerText = `Llevas ${activePlayer.truthCount}/3 Verdades seguidas. Elige opción:`;

        const btnVerdad = document.getElementById('btnVerdad');
        // Si ya usó 3 verdades, forzar reto
        if (activePlayer.truthCount >= 3) {
          btnVerdad.disabled = true;
          btnVerdad.innerText = "Verdad (Límite 3/3 alcanzado)";
        } else {
          btnVerdad.disabled = false;
          btnVerdad.innerText = `Verdad (${activePlayer.truthCount}/3)`;
        }

        document.getElementById('ruletaOptions').classList.remove('hidden');
      }
    }

    function chooseType(type) {
      if (!activePlayer) return;

      if (type === 'verdad') {
        activePlayer.truthCount++;
        const randomQ = verdades[Math.floor(Math.random() * verdades.length)];
        document.getElementById('promptText').innerText = `[VERDAD]: ${randomQ}`;
      } else {
        activePlayer.truthCount = 0; // Resetea el contador si hace Reto
        const randomR = retos[Math.floor(Math.random() * retos.length)];
        document.getElementById('promptText').innerText = `[RETO]: ${randomR}`;
      }
      
      document.getElementById('ruletaOptions').classList.add('hidden');
      renderPlayers();
    }

    function failChallenge() {
      if (!activePlayer) return;

      activePlayer.lives--;
      alert(`¡${activePlayer.name} no cumplió y perdió 1 vida! Quedan: ${activePlayer.lives}`);

      if (activePlayer.lives <= 0) {
        alert(`☠️ ¡${activePlayer.name} se quedó sin vidas y ha sido eliminado del juego!`);
        removePlayer(activePlayer.name);
      }

      document.getElementById('ruletaOptions').classList.add('hidden');
      document.getElementById('actionTitle').innerText = "Turno finalizado";
      document.getElementById('promptText').innerText = "Giren de nuevo para continuar.";
      renderPlayers();
    }
  </script>
</body>
</html>
